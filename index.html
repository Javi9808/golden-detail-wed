<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Detail</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
}

/* INTRO */
.intro{
  position:fixed;
  inset:0;
  background:#000;
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  animation:introExit 1.2s ease forwards;
  animation-delay:7s;
}

.reflection{
  position:absolute;
  width:80%;
  height:120px;
  top:28%;
  opacity:0;
  background:linear-gradient(90deg,transparent,rgba(214,173,69,.12),rgba(255,255,255,.18),rgba(214,173,69,.12),transparent);
  filter:blur(10px);
  border-radius:50%;
}

.reflection.one{animation:reflectOne 1.4s ease forwards;animation-delay:.8s}
.reflection.two{animation:reflectTwo 1.4s ease forwards;animation-delay:2.2s}

.shield{
  width:118px;
  height:138px;
  border:2px solid #d6ad45;
  border-radius:44% 44% 56% 56%;
  color:#d6ad45;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:900;
  letter-spacing:2px;
  opacity:0;
  transform:scale(.85);
  box-shadow:0 0 30px rgba(214,173,69,.35);
  animation:shieldShow 1.2s ease forwards;
  animation-delay:4.6s;
}

.line{
  position:absolute;
  width:0;
  height:2px;
  background:#d6ad45;
  top:50%;
  left:-20%;
  box-shadow:0 0 18px #d6ad45;
  animation:lineTravel 1.6s ease forwards;
  animation-delay:3.8s;
}

.brand{
  text-align:center;
  opacity:0;
  margin-top:24px;
  animation:brandShow 1s ease forwards;
  animation-delay:5.6s;
}

.brand h1{
  margin:0;
  color:#d6ad45;
  letter-spacing:5px;
  font-size:32px;
}

.brand p{
  margin:8px 0 0;
  color:#ddd;
  letter-spacing:2px;
  font-size:13px;
}

/* HOME */
.home{
  min-height:100vh;
  background:
    linear-gradient(180deg,rgba(0,0,0,.15),#000 92%),
    url("24096899-4B8B-4D5D-AF60-5029365007D2.png") center/cover no-repeat;
  opacity:0;
  transform:scale(1.04);
  animation:homeIn 1.4s ease forwards;
  animation-delay:7.2s;
}

.home-inner{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:24px;
}

.cta{
  display:inline-block;
  background:linear-gradient(135deg,#f3cc72,#b98525);
  color:#000;
  padding:16px 22px;
  border-radius:12px;
  font-weight:900;
  text-decoration:none;
  text-align:center;
  margin-bottom:20px;
}

.note{
  color:#d6ad45;
  text-align:center;
  font-size:13px;
  letter-spacing:2px;
  margin-bottom:18px;
}

@keyframes reflectOne{
  0%{opacity:0;transform:translateX(-40px)}
  45%{opacity:1}
  100%{opacity:0;transform:translateX(30px)}
}

@keyframes reflectTwo{
  0%{opacity:0;transform:translateX(40px)}
  45%{opacity:1}
  100%{opacity:0;transform:translateX(-30px)}
}

@keyframes lineTravel{
  0%{width:0;left:-20%;opacity:0}
  30%{opacity:1}
  70%{width:70%;left:15%}
  100%{width:0;left:50%;opacity:0}
}

@keyframes shieldShow{
  to{opacity:1;transform:scale(1)}
}

@keyframes brandShow{
  to{opacity:1}
}

@keyframes introExit{
  to{opacity:0;visibility:hidden}
}

@keyframes homeIn{
  to{opacity:1;transform:scale(1)}
}
</style>
</head>

<body>

<div class="intro">
  <div class="reflection one"></div>
  <div class="reflection two"></div>
  <div class="line"></div>

  <div class="shield">GD</div>

  <div class="brand">
    <h1>GOLDEN DETAIL</h1>
    <p>PREMIUM AUTO DETAILING</p>
  </div>
</div>

<main class="home">
  <div class="home-inner">
    <a class="cta" href="https://wa.me/59892006556?text=Hola%20Golden%20Detail,%20me%20gustaría%20solicitar%20un%20presupuesto%20para%20mi%20vehículo.">
      SOLICITAR PRESUPUESTO
    </a>
    <div class="note">TRABAJAMOS SOLO EN MALDONADO</div>
  </div>
</main>

</body>
</html>
