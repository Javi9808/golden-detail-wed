<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Detail</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

.intro{
  position:fixed;
  inset:0;
  background:#000;
  z-index:9999;
  overflow:hidden;
}

.scene{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  opacity:0;
  transform:scale(1.04);
  transition:opacity .45s ease, transform 1.1s ease;
}

.scene.active{
  opacity:1;
  transform:scale(1);
}

.scene.fade{
  opacity:0;
}

.home{
  position:relative;
  width:100vw;
  height:100vh;
  background:#000;
  opacity:0;
  transition:opacity 1s ease, transform 1s ease;
  transform:scale(1.04);
  overflow:hidden;
}

.home.show{
  opacity:1;
  transform:scale(1);
}

.home img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
}

.menu-touch{
  position:absolute;
  top:0;
  left:0;
  width:90px;
  height:90px;
  z-index:5;
  background:transparent;
  border:0;
}

.whatsapp-touch{
  position:absolute;
  left:10%;
  right:10%;
  bottom:110px;
  height:75px;
  z-index:5;
}

.menu{
  position:fixed;
  inset:0;
  z-index:10000;
  background:rgba(0,0,0,.42);
  backdrop-filter:blur(22px);
  -webkit-backdrop-filter:blur(22px);
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
}

.menu.open{
  opacity:1;
  pointer-events:auto;
}

.close{
  position:absolute;
  top:24px;
  right:24px;
  background:transparent;
  border:0;
  color:#d6ad45;
  font-size:46px;
}

.menu-inner{
  height:100%;
  padding:90px 34px 40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.menu-link{
  color:#fff;
  text-decoration:none;
  font-size:24px;
  letter-spacing:1px;
  padding:17px 0;
  border-bottom:1px solid rgba(214,173,69,.28);
}

.menu-link span{
  color:#d6ad45;
  margin-right:14px;
}

.menu-wsp{
  margin-top:34px;
  border:1px solid #d6ad45;
  color:#d6ad45;
  text-align:center;
  text-decoration:none;
  border-radius:16px;
  padding:18px;
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="intro" id="intro"></div>

<main class="home" id="home">
  <img src="24096899-4B8B-4D5D-AF60-5029365007D2.png" alt="Golden Detail">

  <button class="menu-touch" onclick="openMenu()"></button>

  <a class="whatsapp-touch"
     href="https://wa.me/59892006556?text=Hola%20Golden%20Detail,%20me%20gustaría%20solicitar%20un%20presupuesto%20para%20mi%20vehículo.">
  </a>
</main>

<div class="menu" id="menu">
  <button class="close" onclick="closeMenu()">×</button>

  <div class="menu-inner">
    <a class="menu-link" href="#"><span>01</span>INICIO</a>
    <a class="menu-link" href="#"><span>02</span>SERVICIOS</a>
    <a class="menu-link" href="#"><span>03</span>BENEFICIOS</a>
    <a class="menu-link" href="#"><span>04</span>SOBRE NOSOTROS</a>
    <a class="menu-link" href="#"><span>05</span>TRABAJOS REALIZADOS</a>
    <a class="menu-link" href="#"><span>06</span>TESTIMONIOS</a>
    <a class="menu-link" href="#"><span>07</span>CONTACTO</a>

    <a class="menu-wsp"
       href="https://wa.me/59892006556?text=Hola%20Golden%20Detail,%20me%20gustaría%20solicitar%20un%20presupuesto%20para%20mi%20vehículo.">
      ESCRÍBENOS<br>+598 92 006 556
    </a>
  </div>
</div>

<script>
const base = "assets/intro/";

const scenes = [
  "IMG_3655.jpeg",
  "IMG_3656.jpeg",
  "IMG_3657.jpeg",
  "IMG_3658.jpeg",
  "IMG_3659.jpeg",
  "IMG_3660.jpeg",
  "IMG_3661.jpeg",
  "IMG_3662.jpeg",
  "IMG_3663.jpeg",
  "IMG_3664.jpeg",
  "IMG_3665.jpeg",
  "IMG_3666.jpeg",
  "IMG_3667.jpeg",
  "IMG_3668.jpeg",
  "IMG_3669.jpeg"
];

const times = [
  1000,1000,1000,1000,
  250,250,250,250,250,250,250,250,250,300,
  1200
];

const intro = document.getElementById("intro");
const home = document.getElementById("home");

let index = 0;

function showScene(){
  if(index >= scenes.length){
    intro.style.opacity = "0";
    intro.style.transition = "opacity 1s ease";
    home.classList.add("show");

    setTimeout(()=>{
      intro.style.display = "none";
      document.body.style.overflow = "auto";
    },1000);

    return;
  }

  const img = document.createElement("img");
  img.src = base + scenes[index];
  img.className = "scene";
  intro.appendChild(img);

  setTimeout(()=> img.classList.add("active"), 50);

  setTimeout(()=>{
    img.classList.add("fade");

    setTimeout(()=>{
      img.remove();
      index++;
      showScene();
    },450);

  }, times[index]);
}

window.addEventListener("load", showScene);

function openMenu(){
  document.getElementById("menu").classList.add("open");
}

function closeMenu(){
  document.getElementById("menu").classList.remove("open");
}
</script>

</body>
</html>
