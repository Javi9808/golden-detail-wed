<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Golden Detail</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}

/* INTRO */
.intro{
  position:fixed;
  inset:0;
  background:#000;
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  animation:hideIntro 1s ease forwards;
  animation-delay:8.5s;
}

.lights{
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 30% 48%, rgba(214,173,69,.55), transparent 8%),
    radial-gradient(circle at 70% 48%, rgba(214,173,69,.55), transparent 8%);
  opacity:0;
  animation:lights 1.2s ease forwards;
  animation-delay:1s;
}

.carLine{
  position:absolute;
  width:70%;
  height:2px;
  top:46%;
  background:linear-gradient(90deg,transparent,#d6ad45,#fff,#d6ad45,transparent);
  filter:blur(.4px);
  opacity:0;
  animation:carLine 2.5s ease forwards;
  animation-delay:2s;
}

.goldLine{
  position:absolute;
  width:0;
  height:2px;
  background:#d6ad45;
  box-shadow:0 0 18px #d6ad45;
  animation:goldTravel 1.3s ease forwards;
  animation-delay:4.3s;
}

.shield{
  width:130px;
  height:150px;
  border:2px solid #d6ad45;
  border-radius:42% 42% 55% 55%;
  color:#d6ad45;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  opacity:0;
  transform:scale(.85);
  box-shadow:0 0 35px rgba(214,173,69,.35);
  animation:showShield .8s ease forwards;
  animation-delay:5.3s;
}

.stars{
  font-size:13px;
  letter-spacing:3px;
  margin-bottom:8px;
}

.gd{
  font-size:38px;
  font-weight:900;
  letter-spacing:2px;
}

.carIcon{
  font-size:22px;
  margin-top:6px;
}

.brandIntro{
  text-align:center;
  opacity:0;
  margin-top:22px;
  animation:showBrand 1s ease forwards;
  animation-delay:6.3s;
}

.brandIntro h1{
  color:#d6ad45;
  letter-spacing:4px;
  font-size:30px;
  margin:0;
}

.brandIntro p{
  color:#ddd;
  letter-spacing:2px;
  font-size:12px;
  margin-top:8px;
}

/* HOME */
.home{
  min-height:100vh;
  background:
    linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.35),#000 94%),
    url("24096899-4B8B-4D5D-AF60-5029365007D2.png") center/contain no-repeat;
  background-color:#000;
  opacity:0;
  transform:scale(1.04);
  animation:homeIn 1.2s ease forwards;
  animation-delay:8.6s;
  position:relative;
}

.topBar{
  position:absolute;
  top:0;
  left:0;
  right:0;
  padding:18px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:5;
}

.menuBtn{
  background:rgba(0,0,0,.35);
  color:#d6ad45;
  border:1px solid rgba(214,173,69,.5);
  border-radius:12px;
  padding:10px 14px;
  font-size:24px;
}

.homeBottom{
  position:absolute;
  left:18px;
  right:18px;
  bottom:22px;
  z-index:5;
}

.cta{
  display:block;
  text-align:center;
  background:linear-gradient(135deg,#f2cd73,#b88425);
  color:#000;
  font-weight:900;
  padding:16px 22px;
  border-radius:14px;
  text-decoration:none;
  box-shadow:0 0 22px rgba(214,173,69,.25);
}

.location{
  text-align:center;
  color:#d6ad45;
  letter-spacing:2px;
  font-size:12px;
  margin-top:14px;
}

/* GLASS MENU */
.menuOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  z-index:1000;
  opacity:0;
  pointer-events:none;
  transition:.25s ease;
}

.menuOverlay.open{
  opacity:1;
  pointer-events:auto;
}

.menuPanel{
  width:100%;
  height:100%;
  padding:34px 28px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.closeBtn{
  position:absolute;
  top:20px;
  right:20px;
  background:transparent;
  color:#d6ad45;
  border:1px solid rgba(214,173,69,.55);
  border-radius:12px;
  padding:10px 14px;
  font-size:22px;
}

.menuItem{
  display:block;
  color:#fff;
  text-decoration:none;
  font-size:25px;
  padding:17px 0;
  border-bottom:1px solid rgba(214,173,69,.22);
  letter-spacing:1px;
}

.menuItem span{
  color:#d6ad45;
  margin-right:10px;
}

.menuWhatsapp{
  margin-top:34px;
  display:block;
  text-align:center;
  background:linear-gradient(135deg,#f2cd73,#b88425);
  color:#000;
  padding:16px 20px;
  border-radius:14px;
  font-weight:900;
  text-decoration:none;
}

@keyframes lights{
  0%{opacity:0}
  45%{opacity:1}
  100%{opacity:0}
}
@keyframes carLine{
  0%{opacity:0;transform:translateX(-35px)}
  40%{opacity:1}
  100%{opacity:0;transform:translateX(35px)}
}
@keyframes goldTravel{
  0%{width:0;opacity:0}
  35%{width:70%;opacity:1}
  100%{width:0;opacity:0}
}
@keyframes showShield{
  to{opacity:1;transform:scale(1)}
}
@keyframes showBrand{
  to{opacity:1}
}
@keyframes hideIntro{
  to{opacity:0;visibility:hidden}
}
@keyframes homeIn{
  to{opacity:1;transform:scale(1)}
}
</style>
</head>

<body>

<div class="intro">
  <div class="lights"></div>
  <div class="carLine"></div>
  <div class="goldLine"></div>

  <div class="shield">
    <div class="stars">★★★★★</div>
    <div class="gd">GD</div>
    <div class="carIcon">▱▰▱</div>
  </div>

  <div class="brandIntro">
    <h1>GOLDEN DETAIL</h1>
    <p>PREMIUM AUTO DETAILING</p>
  </div>
</div>

<section class="home">
  <div class="topBar">
    <div></div>
    <button class="menuBtn" onclick="openMenu()">⋮</button>
  </div>

  <div class="homeBottom">
    <a class="cta" href="https://wa.me/59892006556?text=Hola%20Golden%20Detail,%20me%20gustaría%20solicitar%20un%20presupuesto%20para%20mi%20vehículo.">
      SOLICITAR PRESUPUESTO
    </a>
    <div class="location">TRABAJAMOS SOLO EN MALDONADO</div>
  </div>
</section>

<div class="menuOverlay" id="menu">
  <button class="closeBtn" onclick="closeMenu()">×</button>

  <div class="menuPanel">
    <a class="menuItem" href="#"><span>01</span>Inicio</a>
    <a class="menuItem" href="#"><span>02</span>Servicios</a>
    <a class="menuItem" href="#"><span>03</span>Antes & Después</a>
    <a class="menuItem" href="#"><span>04</span>Nuestra Historia</a>
    <a class="menuItem" href="#"><span>05</span>Testimonios</a>
    <a class="menuItem" href="#"><span>06</span>Contacto</a>

    <a class="menuWhatsapp" href="https://wa.me/59892006556?text=Hola%20Golden%20Detail,%20me%20gustaría%20solicitar%20un%20presupuesto%20para%20mi%20vehículo.">
      ESCRIBIR POR WHATSAPP
    </a>
  </div>
</div>

<script>
function openMenu(){
  document.getElementById("menu").classList.add("open");
}
function closeMenu(){
  document.getElementById("menu").classList.remove("open");
}
</script>

</body>
</html>
