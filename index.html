<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Detail</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#000;color:white;font-family:Arial,sans-serif;overflow-x:hidden}
.loader{
position:fixed;inset:0;background:#000;z-index:99;
display:flex;align-items:center;justify-content:center;flex-direction:column;
animation:hide 1s ease forwards;animation-delay:5s
}
.car-reflect{
width:85%;height:160px;position:relative;margin-bottom:35px;
background:radial-gradient(circle at 65% 45%,rgba(214,173,69,.25),transparent 28%);
opacity:0;animation:car 2s ease forwards
}
.car-reflect:before{
content:"";position:absolute;left:8%;right:8%;top:65px;height:2px;
background:linear-gradient(90deg,transparent,#d6ad45,white,#d6ad45,transparent);
box-shadow:0 0 25px #d6ad45;border-radius:100%;animation:shine 2s ease infinite
}
.car-reflect:after{
content:"";position:absolute;right:12%;top:78px;width:70px;height:8px;
background:white;border-radius:30px;box-shadow:0 0 25px white
}
.logo-draw{
width:120px;height:140px;border:2px solid #d6ad45;border-radius:45% 45% 55% 55%;
display:flex;align-items:center;justify-content:center;
font-size:42px;color:#d6ad45;font-weight:bold;opacity:0;
box-shadow:0 0 25px rgba(214,173,69,.35);
animation:logo 1.4s ease forwards;animation-delay:2.2s
}
.brand{
opacity:0;text-align:center;margin-top:22px;animation:brand 1s ease forwards;animation-delay:3.5s
}
.brand h1{color:#d6ad45;margin:0;font-size:34px;letter-spacing:4px}
.brand p{margin:8px 0;color:#ddd;letter-spacing:2px}
.home{min-height:100vh;padding:70px 24px;text-align:center;background:linear-gradient(#050505,#000)}
.home h2{font-size:46px;color:#d6ad45}
.home p{font-size:21px;line-height:1.5}
.btn{display:inline-block;background:#d6ad45;color:#000;padding:16px 26px;border-radius:12px;font-weight:bold;text-decoration:none;margin-top:20px}
@keyframes car{to{opacity:1}}
@keyframes shine{50%{filter:brightness(1.8)}}
@keyframes logo{to{opacity:1;transform:scale(1.05)}}
@keyframes brand{to{opacity:1}}
@keyframes hide{to{opacity:0;visibility:hidden}}
</style>
</head>
<body>

<div class="loader">
  <div class="car-reflect"></div>
  <div class="logo-draw">GD</div>
  <div class="brand">
    <h1>GOLDEN DETAIL</h1>
    <p>PREMIUM AUTO DETAILING</p>
    <p>Perfección en cada detalle</p>
  </div>
</div>

<section class="home">
  <h2>Golden Detail</h2>
  <p>Tu vehículo merece una atención excepcional.</p>
  <a class="btn" href="https://wa.me/59892006556?text=Hola%20Golden%20Detail,%20me%20gustaría%20solicitar%20un%20presupuesto%20para%20mi%20vehículo.">Solicitar Presupuesto</a>
</section>

</body>
</html>
